# Basic keyboard settings
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_MOUSE=y

# Debounce - increase if keys are registering multiple presses per physical press
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=10
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# Battery reporting - shows level in OS system tray
CONFIG_ZMK_BATTERY_REPORTING=y

# Power management - deep sleep after 30 min idle (first keypress wakes keyboard, second wakes PC)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
